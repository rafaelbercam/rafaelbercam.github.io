<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rafael Berçam - Currículo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="language-toggle">
        <button id="lang-pt" class="lang-btn active" data-lang="pt">PT</button>
        <button id="lang-en" class="lang-btn" data-lang="en">EN</button>
    </div>

    <div class="container">
        <header id="header">
            <h1 id="name"></h1>
            <p class="title" id="title"></p>
            
            <div class="contact-info" id="contact-info">
            </div>
        </header>

        
        <section id="experience-section">
            <h2 id="experience-title"></h2>
            <div id="experience-content"></div>
        </section>

        <section id="education-section">
            <h2 id="education-title"></h2>
            <div id="education-content"></div>
        </section>

        <section id="certifications-section">
            <h2 id="certifications-title"></h2>
            <div id="certifications-content"></div>
        </section>

        <section id="skills-section">
            <h2 id="skills-title"></h2>
            <div id="skills-content" class="skills-grid"></div>
        </section>

        <section id="languages-section">
            <h2 id="languages-title"></h2>
            <div id="languages-content"></div>
        </section>

        <section id="volunteer-section">
            <h2 id="volunteer-title"></h2>
            <div id="volunteer-content"></div>
        </section>

        <footer>
            <div class="footer-content">
                <p class="last-update" id="last-update"></p>
                <button id="download-pdf-btn" class="pdf-btn"></button>
            </div>
        </footer>
    </div>

    <script>
        // Language Management and Data Loading
        let currentLanguage = localStorage.getItem('resumeLanguage') || 'pt';
        let currentData = {};

        async function loadData(lang) {
            try {
                const response = await fetch(`data-${lang}.json`);
                currentData = await response.json();
                renderResume();
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        function renderResume() {
            const data = currentData;

            // Personal Info
            document.getElementById('name').textContent = data.personal.name;
            document.getElementById('title').textContent = data.personal.title;
            
            const contactInfo = document.getElementById('contact-info');
            contactInfo.innerHTML = `
                <span>${data.personal.location}</span>
                <span>•</span>
                <span><a href="mailto:${data.personal.email}">${data.personal.email}</a></span>
                <span>•</span>
                <span><a href="${data.personal.linkedin}" target="_blank">LinkedIn</a></span>
                <span>•</span>
                <span><a href="${data.personal.github}" target="_blank">GitHub</a></span>
            `;

            // Experience
            document.getElementById('experience-title').textContent = data.sections.experience;
            const experienceContent = document.getElementById('experience-content');
            experienceContent.innerHTML = data.experience.map(job => `
                <div class="job">
                    <div class="job-header">
                        <h3>${job.title}</h3>
                        <span class="date">${job.period}</span>
                    </div>
                    <p class="company">${job.company}</p>
                    <ul>
                        ${job.responsibilities.map(resp => `<li>${resp}</li>`).join('')}
                    </ul>
                </div>
            `).join('');

            // Education
            document.getElementById('education-title').textContent = data.sections.education;
            const educationContent = document.getElementById('education-content');
            educationContent.innerHTML = data.education.map(edu => `
                <div class="education">
                    <h3>${edu.degree}</h3>
                    <p class="company">${edu.institution}</p>
                    <p class="date">${edu.period}</p>
                </div>
            `).join('');

            // Certifications
            document.getElementById('certifications-title').textContent = data.sections.certifications;
            const certificationsContent = document.getElementById('certifications-content');
            certificationsContent.innerHTML = `
                <ul>
                    ${data.certifications.map(cert => `<li>${cert.name} (${cert.year})</li>`).join('')}
                </ul>
            `;

            // Skills
            document.getElementById('skills-title').textContent = data.sections.skills;
            const skillsContent = document.getElementById('skills-content');
            skillsContent.innerHTML = data.skills.map(skill => `
                <div class="skill-category">
                    <h4>${skill.category}</h4>
                    <p>${skill.description}</p>
                </div>
            `).join('');

            // Languages
            document.getElementById('languages-title').textContent = data.sections.languages;
            const languagesContent = document.getElementById('languages-content');
            languagesContent.innerHTML = `
                <ul>
                    ${data.languages.map(lang => `<li>${lang.language} – ${lang.level}</li>`).join('')}
                </ul>
            `;

            // Volunteer
            document.getElementById('volunteer-title').textContent = data.sections.volunteer;
            const volunteerContent = document.getElementById('volunteer-content');
            volunteerContent.innerHTML = data.volunteer.map(vol => `
                <div class="job">
                    <div class="job-header">
                        <h3>${vol.title}</h3>
                        <span class="date">${vol.period}</span>
                    </div>
                    <p class="company">${vol.organization}</p>
                    <ul>
                        <li>${vol.description}</li>
                    </ul>
                </div>
            `).join('');

            // Footer
            document.getElementById('last-update').textContent = data.personal.lastUpdate;
            document.getElementById('download-pdf-btn').textContent = data.sections.downloadPDF;
        }

        function setLanguage(lang) {
            currentLanguage = lang;
            localStorage.setItem('resumeLanguage', lang);

            // Update button states
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-lang="${lang}"]`).classList.add('active');

            // Load and render data
            loadData(lang);
        }

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', function() {
            setLanguage(currentLanguage);

            // Language button listeners
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const lang = this.getAttribute('data-lang');
                    setLanguage(lang);
                });
            });

            // PDF Download
            document.getElementById('download-pdf-btn').addEventListener('click', function() {
                window.print();
            });
        });
    </script>
</body>
</html>
